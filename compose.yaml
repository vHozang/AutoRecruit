services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resume-backend
    ports:
      - "8000:8000"
    environment:
      OLLAMA_URL: http://ollama:11434
      EMBED_MODEL: mxbai-embed-large
      DATA_DIR: /data
    volumes:
      - ./data:/data
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
